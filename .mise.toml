[tools]
node = "22"
rust = "1.97"

[env]
# One shared cargo build cache for every worktree of this repo — a fresh
# worktree builds warm instead of cold-compiling all deps into its own
# target/ (~190MB and minutes per worktree). Cargo serializes concurrent
# builds against the same dir with its own lock, so parallel worktrees are
# safe. Bumping the rust toolchain still invalidates it (by design).
CARGO_TARGET_DIR = "{{env.HOME}}/.cache/queohoh/cargo-target"

# --- dev loop ---

[tasks.sync]
description = "Install all workspace dependencies (builds once so pnpm can link workspace bin shims)"
run = [
	"pnpm install",
	"pnpm -r build",
	"pnpm install",
	"cargo fetch",
]

[tasks.build]
description = "Compile all packages (core, daemon) to dist/"
run = "pnpm -r build"

[tasks.test]
description = "Run all vitest suites"
run = "pnpm -r test"

[tasks.typecheck]
description = "tsc --noEmit across packages"
run = "pnpm -r typecheck"

[tasks.lint]
description = "biome check --write (must run under node 22)"
run = "pnpm lint"

[tasks."lint:ci"]
description = "biome check, read-only"
run = "pnpm lint:ci"

[tasks."test:rs"]
description = "cargo test across all crates"
run = "cargo test"

[tasks."typecheck:rs"]
description = "cargo check across all targets (tsc --noEmit analog)"
run = "cargo check --all-targets"

[tasks."lint:rs"]
description = "clippy, warnings are errors (biome analog)"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.check]
description = "Full gate, both languages: TS test + typecheck + lint:ci, Rust test + check + clippy"
depends = ["test", "typecheck", "lint:ci", "test:rs", "typecheck:rs", "lint:rs"]

# --- run ---

[tasks.daemon]
description = "Run the queohoh daemon in the foreground (rebuilds first)"
depends = ["build"]
run = "node packages/daemon/dist/cli.js daemon"

[tasks."daemon:ensure"]
description = "Ensure a daemon is running; start one detached if not (rebuilds first)"
depends = ["build"]
run = "scripts/daemon-ensure.sh"

[tasks."daemon:restart"]
description = "Restart the daemon so it serves the freshly-built snapshot (rebuilds first)"
depends = ["build"]
run = "scripts/daemon-ensure.sh --restart"

[tasks.status]
description = "Print daemon state JSON via the unix socket"
run = "node packages/daemon/dist/cli.js status"

[tasks.tui]
description = "Launch the qoo-tui cockpit (ratatui; builds the release binary, self-heals the daemon)"
depends = ["daemon:ensure"]
run = [
	"cargo build --release -p qoo-tui",
	# The binary lands in the shared CARGO_TARGET_DIR (see [env]), not ./target.
	'"${CARGO_TARGET_DIR:-./target}/release/qoo-tui"',
]

# --- integrations ---

[tasks."mcp:register"]
description = "Register the queohoh MCP server with Claude Code (user scope)"
run = 'claude mcp add --scope user queohoh -- "$(command -v node)" {{config_root}}/packages/daemon/dist/cli.js mcp'

[tasks."launchd:up"]
description = "Install the launchd plist and bootstrap the daemon (rebuilds first)"
depends = ["build"]
run = [
	"node packages/daemon/dist/cli.js launchd:install",
	"launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.queohoh.daemon.plist",
]

[tasks."launchd:down"]
description = "Stop the launchd daemon and remove the plist"
run = [
	"launchctl bootout gui/$(id -u)/com.queohoh.daemon || true",
	"node packages/daemon/dist/cli.js launchd:uninstall",
]

# --- rust tui ---

[tasks."tui:rs"]
description = "Build and launch the Rust ratatui TUI (release)"
run = [
	"cargo build --release -p qoo-tui",
	'"${CARGO_TARGET_DIR:-./target}/release/qoo-tui"',
]

[tasks."tui:rs:dev"]
description = "Run the Rust ratatui TUI unoptimized (fast rebuild loop)"
run = "cargo run -p qoo-tui"
